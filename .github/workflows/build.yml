name: Build/Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Bundle Ghostscript for macOS
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p assets/gs/mac
          curl -L -o Ghostscript.pkg https://pages.uoregon.edu/koch/Ghostscript-10.07.0.pkg
          pkgutil --expand-full Ghostscript.pkg expanded_gs
          GS_BIN=$(find expanded_gs -name "gs-noX11" -type f | head -n 1)
          if [ -f "$GS_BIN" ]; then
            cp "$GS_BIN" assets/gs/mac/gs
            chmod +x assets/gs/mac/gs
            echo "Ghostscript binary bundled successfully."
          else
            echo "Error: gs-noX11 binary not found in package!"
            exit 1
          fi
          INIT_FILE=$(find expanded_gs -name "gs_init.ps" -type f | head -n 1)
          if [ ! -z "$INIT_FILE" ]; then
            RESOURCE_DIR=$(dirname $(dirname "$INIT_FILE"))
            echo "Resource dir found at $RESOURCE_DIR. Bundling it..."
            rm -rf assets/gs/Resource
            cp -R "$RESOURCE_DIR" assets/gs/Resource
          else
            echo "Warning: gs_init.ps not found. Using pre-existing resources."
          fi

      - name: Build/Release Electron App
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release: ${{ startsWith(github.ref, 'refs/tags/v') }}
          # Per Mac serve il certificato per firmare, altrimenti impostare skip_notarization
          # mac_certs: ${{ secrets.MAC_CERTS }}
          # mac_certs_password: ${{ secrets.MAC_CERTS_PASSWORD }}
